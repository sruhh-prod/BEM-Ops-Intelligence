<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}BEM Ops Intelligence{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: {
              DEFAULT: '#C49A2A',
              light:   '#D4AE4A',
              dark:    '#9E7B1C',
              subtle:  '#FDF8EC',
            },
            cream: {
              DEFAULT: '#FAF9F6',
              dark:    '#F0EDE6',
              border:  '#E5E1D8',
            },
            charcoal: {
              DEFAULT: '#1C1917',
              soft:    '#292524',
              muted:   '#44403C',
            }
          },
          fontFamily: {
            display: ['Georgia', 'Cambria', 'serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background-color: #FAF9F6; color: #1C1917; }
    .scrollbar-hide { scrollbar-width: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .border-gold { border-color: #C49A2A; }
    .text-gold { color: #C49A2A; }
    .bg-gold-subtle { background-color: #FDF8EC; }
  </style>
</head>

<body class="h-full" style="background-color:#FAF9F6;">
<div class="flex h-full min-h-screen">

  <!-- Sidebar — dark charcoal, gold accents -->
  <aside class="w-60 shrink-0 flex flex-col" style="background-color:#1C1917; border-right:1px solid #292524;">

    <!-- Brand -->
    <div class="px-5 pt-6 pb-5" style="border-bottom:1px solid #292524;">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded flex items-center justify-center shrink-0" style="background-color:#C49A2A;">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
          </svg>
        </div>
        <div>
          <div class="text-sm font-semibold leading-none tracking-tight" style="color:#FAF9F6;">Big Easy Management</div>
          <div class="text-xs mt-1 tracking-wide uppercase" style="color:#78716C; font-size:10px; letter-spacing:0.08em;">Ops Intelligence</div>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-0.5">

      <a href="/" class="flex items-center gap-2.5 px-3 py-2.5 rounded text-sm font-medium transition-colors
        {% if page == 'dashboard' %}
          text-white
        {% else %}
          hover:text-stone-200 hover:bg-stone-800/40
        {% endif %}"
        style="{% if page == 'dashboard' %}background-color:#292524; border-left:3px solid #C49A2A; padding-left:calc(0.75rem - 3px);{% else %}color:#A8A29E;{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
        </svg>
        Dashboard
      </a>

      <a href="/property" class="flex items-center gap-2.5 px-3 py-2.5 rounded text-sm font-medium transition-colors
        {% if page == 'property' %}
          text-white
        {% else %}
          hover:text-stone-200 hover:bg-stone-800/40
        {% endif %}"
        style="{% if page == 'property' %}background-color:#292524; border-left:3px solid #C49A2A; padding-left:calc(0.75rem - 3px);{% else %}color:#A8A29E;{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
        Properties
      </a>

      <a href="/pascal" class="flex items-center gap-2.5 px-3 py-2.5 rounded text-sm font-medium transition-colors
        {% if page == 'pascal' %}
          text-white
        {% else %}
          hover:text-stone-200 hover:bg-stone-800/40
        {% endif %}"
        style="{% if page == 'pascal' %}background-color:#292524; border-left:3px solid #C49A2A; padding-left:calc(0.75rem - 3px);{% else %}color:#A8A29E;{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
        </svg>
        Pascal
      </a>
    </nav>

    <!-- Footer -->
    <div class="px-5 py-4" style="border-top:1px solid #292524;">
      <div class="text-xs" style="color:#57534E;">New Orleans, Louisiana</div>
      <div class="text-xs mt-0.5" style="color:#3D3835;">bigeasymanagement.com</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-y-auto" style="background-color:#FAF9F6;">
    {% block content %}{% endblock %}
  </main>

</div>
</body>
</html>
